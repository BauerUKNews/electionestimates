<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2eb;
    --surface: #faf8f4;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --text-primary: #1a1a18;
    --text-secondary: #5a5a52;
    --text-muted: #9a9a90;
    --accent: #2b3a2b;
    --now-color: #c0392b;
    --now-bg: #fdf0ee;
    --sans: 'IBM Plex Sans', sans-serif;
    --col-english-bg: #eef1f8;
    --col-english-text: #2a3a6b;
    --col-english-dot: #3d5a9e;
    --col-scottish-bg: #edf5ee;
    --col-scottish-text: #1d4a25;
    --col-scottish-dot: #2e7d3a;
    --col-welsh-bg: #fdf0ec;
    --col-welsh-text: #6b2010;
    --col-welsh-dot: #b5381a;
    --col-mayoral-bg: #f5f0fb;
    --col-mayoral-text: #3d2070;
    --col-mayoral-dot: #6b3db5;
  }

  body {
    background: var(--bg);
    font-family: var(--sans);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .header-left h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .header-left .sub {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .clock-display {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .clock-time {
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .clock-date {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 300;
  }

  /* ── Filters ── */
  .filter-bar {
    padding: 0.75rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .filter-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-right: 4px;
    font-weight: 400;
  }

  .filter-btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 400;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.01em;
  }

  .filter-btn:hover { background: rgba(0,0,0,0.04); }

  .filter-btn.active-all {
    background: var(--accent);
    color: #f0ede5;
    border-color: var(--accent);
  }
  .filter-btn.active-english {
    background: var(--col-english-dot);
    color: #fff;
    border-color: var(--col-english-dot);
  }
  .filter-btn.active-scottish {
    background: var(--col-scottish-dot);
    color: #fff;
    border-color: var(--col-scottish-dot);
  }
  .filter-btn.active-welsh {
    background: var(--col-welsh-dot);
    color: #fff;
    border-color: var(--col-welsh-dot);
  }
  .filter-btn.active-mayoral {
    background: var(--col-mayoral-dot);
    color: #fff;
    border-color: var(--col-mayoral-dot);
  }
  .filter-btn.active-friday,
  .filter-btn.active-saturday {
    background: var(--text-primary);
    color: #f0ede5;
    border-color: var(--text-primary);
  }

  .filter-btn.active-group {
    background: #5a4a00;
    color: #fefbe8;
    border-color: #5a4a00;
  }

  .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* ── Main layout ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 2rem 4rem;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
    padding: 1rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .leg-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .leg-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .leg-now {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--now-color);
    margin-left: auto;
    font-weight: 500;
  }

  .leg-now-line {
    width: 20px;
    height: 2px;
    background: var(--now-color);
    border-radius: 1px;
  }

  /* ── Timeline ── */
  .day-section {
    margin-bottom: 2.5rem;
  }

  .day-heading {
    font-size: 11px;
    font-weight: 600;
    font-style: normal;
    color: var(--text-muted);
    letter-spacing: 0.09em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin-bottom: 0;
  }

  .timeline-wrap {
    position: relative;
    padding-top: 0;
  }

  /* Vertical axis line */
  .timeline-wrap::before {
    content: '';
    position: absolute;
    left: 108px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--border-strong);
  }

  .tl-row {
    position: relative;
    display: flex;
    align-items: flex-start;
    padding: 7px 0;
    min-height: 32px;
  }

  .tl-time {
    width: 96px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 12px;
    font-size: 11.5px;
    color: var(--text-muted);
    padding-top: 4px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
  }

  .tl-dot-wrap {
    width: 24px;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    padding-top: 6px;
    position: relative;
    z-index: 1;
  }

  .tl-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 2px solid var(--bg);
  }

  .tl-entries {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding-left: 8px;
    padding-top: 2px;
  }

  .tl-pill {
    font-size: 11.5px;
    padding: 2px 9px;
    border-radius: 20px;
    font-weight: 400;
    white-space: nowrap;
  }

  .tl-count {
    font-size: 11px;
    color: var(--text-muted);
    padding-top: 4px;
    align-self: flex-start;
    flex-shrink: 0;
  }

  /* ── Now indicator ── */
  .now-indicator {
    position: absolute;
    left: 0;
    right: 0;
    z-index: 10;
    pointer-events: none;
  }

  .now-line {
    position: absolute;
    left: 80px;
    right: 0;
    height: 2px;
    background: var(--now-color);
    top: 0;
  }

  .now-label {
    position: absolute;
    left: 82px;
    top: -18px;
    background: var(--now-color);
    color: #fff;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .now-dot {
    position: absolute;
    left: 104px;
    top: -4px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--now-color);
    border: 2px solid var(--bg);
  }

  /* Past rows slightly dimmed */
  .tl-row.past { opacity: 0.45; }
  .tl-row.current { background: var(--now-bg); border-radius: 6px; }

  /* No results */
  .no-results {
    padding: 2rem 0 2rem 136px;
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Scroll to now */
  .scroll-now-btn {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--now-color);
    color: #fff;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(192,57,43,0.3);
    display: none;
    transition: opacity 0.2s;
    z-index: 200;
  }
  .scroll-now-btn:hover { opacity: 0.85; }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    main { padding: 1rem 1rem 3rem; }
    .filter-bar { padding: 0.75rem 1rem; }
    .clock-time { font-size: 18px; }
    .tl-time { width: 72px; font-size: 10.5px; }
    .timeline-wrap::before { left: 84px; }
    .now-line { left: 60px; }
    .now-dot { left: 80px; }
    .now-label { left: 62px; }
  }
</style>

function getGroup(name) {
  return COUNCIL_GROUPS[name] || null;
}

/* ── Clock ── */
function pad(n){ return String(n).padStart(2,'0'); }

function updateClock(){
  const now = new Date();
  const h = now.getHours(), mi = now.getMinutes(), s = now.getSeconds();
  document.getElementById('clock-time').textContent =
    `${pad(h)}:${pad(mi)}:${pad(s)}`;
  document.getElementById('clock-date').textContent =
    now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

/* ── Now position relative to timeline ── */
function nowMinutes(){
  const now = new Date();
  const day = now.getDay(); // 5=Fri 8 May, 6=Sat 9 May
  // Map to our internal hours: friday h=0–23, saturday h=40+
  if(day === 5) return now.getHours()*60 + now.getMinutes();
  if(day === 6) return (now.getHours()+24)*60 + now.getMinutes() + (16*60); // rough offset — Sat 4pm = h40
  return null; // not election day — show as "now" anyway for demo
}

function rowMinutes(item){
  return item.h * 60 + item.m;
}

/* ── Render ── */
function render(){
  const container = document.getElementById('tl-container');
  container.innerHTML = '';

  const searchTerm = document.getElementById('search-box').value.trim().toLowerCase();

  const filtered = RAW.filter(item => {
    const catMatch = (() => {
      if(activeFilter === 'all') return true;
      if(activeFilter === 'friday') return item.day === 'friday';
      if(activeFilter === 'saturday') return item.day === 'saturday';
      return item.cat === activeFilter;
    })();
    if(!catMatch) return false;

    // Group filter: keep item if any of its entries match the group
    if(activeGroup !== 'all') {
      const hasMatch = item.e.some(name => {
        const g = getGroup(name);
        if(activeGroup === 'Scotland') return g === 'Scotland' || item.cat === 'scottish';
        if(activeGroup === 'Wales') return item.cat === 'welsh';
        return g === activeGroup;
      });
      if(!hasMatch) return false;
    }

    if(!searchTerm) return true;
    return item.e.some(name => name.toLowerCase().includes(searchTerm));
  });

  if(!filtered.length){
    container.innerHTML = '<div class="no-results">No declarations match this filter.</div>';
    return;
  }

  const days = [...new Set(filtered.map(i=>i.day))];

  days.forEach(day => {
    const items = filtered.filter(i=>i.day===day);
    const section = document.createElement('div');
    section.className = 'day-section';

    const heading = document.createElement('div');
    heading.className = 'day-heading';
    heading.textContent = day === 'friday' ? 'Friday 8 May — overnight & daytime' : 'Saturday 8 May';
    section.appendChild(heading);

    const wrap = document.createElement('div');
    wrap.className = 'timeline-wrap';
    section.appendChild(wrap);

    // Group items by time label for display, but keep all separate for now-indicator
    items.forEach((item, idx) => {
      const nowM = nowMinutes();
      const itemM = rowMinutes(item);
      const isPast = nowM !== null && itemM < nowM;
      const isNear = nowM !== null && Math.abs(itemM - nowM) < 30;

      const row = document.createElement('div');
      row.className = 'tl-row' + (isPast ? ' past' : '');
      row.dataset.minutes = itemM;
      row.dataset.day = day;

      const timeEl = document.createElement('div');
      timeEl.className = 'tl-time';
      timeEl.textContent = item.t;
      row.appendChild(timeEl);

      const dotWrap = document.createElement('div');
      dotWrap.className = 'tl-dot-wrap';
      const dot = document.createElement('div');
      dot.className = 'tl-dot';
      dot.style.background = CAT_STYLE[item.cat].dot;
      dotWrap.appendChild(dot);
      row.appendChild(dotWrap);

      const entries = document.createElement('div');
      entries.className = 'tl-entries';
      item.e.forEach(name => {
        const pill = document.createElement('span');
        pill.className = 'tl-pill';
        const searchMatch = searchTerm && name.toLowerCase().includes(searchTerm);
        const groupMatch = activeGroup !== 'all' && (() => {
          const g = getGroup(name);
          if(activeGroup === 'Scotland') return g === 'Scotland' || item.cat === 'scottish';
          if(activeGroup === 'Wales') return g === 'Wales' || item.cat === 'welsh';
          return g === activeGroup;
        })();
        const highlight = searchMatch || groupMatch;
        pill.style.background = highlight ? CAT_STYLE[item.cat].dot : CAT_STYLE[item.cat].bg;
        pill.style.color = highlight ? '#fff' : CAT_STYLE[item.cat].text;
        pill.style.fontWeight = highlight ? '500' : '400';
        pill.textContent = name;
        entries.appendChild(pill);
      });
      if(item.e.length > 3){
        const cnt = document.createElement('span');
        cnt.className = 'tl-count';
        cnt.textContent = item.e.length + ' declarations';
        entries.appendChild(cnt);
      }
      row.appendChild(entries);

      wrap.appendChild(row);
    });

    // Insert "now" indicator
    if(day === 'friday'){
      insertNowIndicator(wrap, items);
    }

    container.appendChild(section);
  });

  updateScrollBtn();
}

function insertNowIndicator(wrap, items){
  const nowM = nowMinutes();
  if(nowM === null) return;

  const rows = wrap.querySelectorAll('.tl-row');
  if(!rows.length) return;

  let insertBefore = null;
  for(const row of rows){
    if(parseInt(row.dataset.minutes) > nowM){
      insertBefore = row;
      break;
    }
  }

  const now = new Date();
  const label = `${pad(now.getHours())}:${pad(now.getMinutes())} now`;

  const ind = document.createElement('div');
  ind.id = 'now-indicator';
  ind.className = 'now-indicator';
  ind.style.position = 'relative';
  ind.style.height = '24px';
  ind.style.margin = '2px 0';

  ind.innerHTML = `
    <div class="now-line"></div>
    <div class="now-label">${label}</div>
    <div class="now-dot"></div>
  `;

  if(insertBefore){
    wrap.insertBefore(ind, insertBefore);
  } else {
    wrap.appendChild(ind);
  }

  nowEl = ind;
}

function updateScrollBtn(){
  const btn = document.getElementById('scroll-now-btn');
  if(nowEl){
    btn.style.display = 'block';
  } else {
    btn.style.display = 'none';
  }
}

document.getElementById('search-box').addEventListener('input', () => render());

/* ── Filter buttons ── */
document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => {
      b.className = 'filter-btn';
    });
    activeFilter = btn.dataset.filter;
    btn.classList.add('active-' + activeFilter);
    render();
  });
});

document.querySelectorAll('[data-group]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-group]').forEach(b => {
      b.className = 'filter-btn';
    });
    activeGroup = btn.dataset.group;
    btn.classList.add('active-group');
    render();
  });
});

// Set initial active state on group buttons
document.querySelector('[data-group="all"]').classList.add('active-group');

/* ── Scroll to now ── */
document.getElementById('scroll-now-btn').addEventListener('click', () => {
  const ind = document.getElementById('now-indicator');
  if(ind) ind.scrollIntoView({behavior:'smooth', block:'center'});
});

/* ── Init ── */
updateClock();
setInterval(updateClock, 1000);
setInterval(() => render(), 60000); // re-render every minute to update past/future
render();

// Auto-scroll to now on first load (after short delay)
setTimeout(() => {
  const ind = document.getElementById('now-indicator');
  if(ind) ind.scrollIntoView({behavior:'smooth', block:'center'});
}, 600);
</script>
